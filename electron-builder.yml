appId: com.climods.app
productName: CLI Mods
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - "node_modules/node-pty/**/*"
  - "node_modules/node-llama-cpp/**/*"
  - "node_modules/@node-llama-cpp/**/*"
asarUnpack:
  - dist-electron/**/*
  - "node_modules/node-pty/**/*"
  - "node_modules/node-llama-cpp/**/*"
  - "node_modules/@node-llama-cpp/**/*"
mac:
  target:
    - target: dmg
      arch: universal
  category: public.app-category.developer-tools
  icon: build/icon.icns
  identity: null
dmg:
  title: CLI Mods ${version}
win:
  target: nsis
linux:
  target:
    - AppImage
    - deb
publish:
  provider: github
  releaseType: release
